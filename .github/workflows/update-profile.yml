name: Update terminal profile

on:
  workflow_dispatch:
  schedule:
    - cron: "17 5 * * *"

permissions:
  contents: write

concurrency:
  group: terminal-profile-update
  cancel-in-progress: true

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Check out profile repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Render profile SVGs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python generate_profile.py

      - name: Commit refreshed stats
        run: |
          if git diff --quiet -- profile-dark-cat.svg profile-light-cat.svg; then
            echo "No profile changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile-dark-cat.svg profile-light-cat.svg
          git commit -m "chore: refresh profile stats"
          git push
